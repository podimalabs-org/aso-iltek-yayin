.cmp-bg-blob.b { top: 5%; right: -10%; background: radial-gradient(circle, rgba(246,139,31,0.75) 0%, rgba(246,139,31,0) 70%); animation: cmpbg-blob-b 26s ease-in-out infinite; }
.cmp-bg-blob.c { bottom: -20%; left: 25%; background: radial-gradient(circle, rgba(19,148,185,0.55) 0%, rgba(19,148,185,0) 70%); animation: cmpbg-blob-c 30s ease-in-out infinite; }
@keyframes cmpbg-shimmer { 0%, 100% { opacity: 0.10; } 50% { opacity: 0.18; } }
.cmp-bg-grid {
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, #000 30%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, #000 30%, transparent 90%);
    animation: cmpbg-shimmer 8s ease-in-out infinite;
}
.cmp-bg-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 110% 90% at 50% 50%, transparent 35%, rgba(6,16,29,0.55) 80%, rgba(6,16,29,0.85) 100%);
}

/* Sol ikon rayı */
.cmp-rail {
    flex-shrink: 0;
    width: 78px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 8px;
    background: rgba(10,18,32,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    backdrop-filter: blur(12px);
}
.cmp-rail-btn {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 11px 4px;
    border: 1px solid transparent;
    border-radius: 13px;
    background: transparent;
    color: rgba(255,255,255,0.55);
    font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
    cursor: pointer;
    transition: color .16s, background .16s, border-color .16s;
}
.cmp-rail-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }
.cmp-rail-btn.on {
    color: #fff;
    background: rgba(246,139,31,0.16);
    border-color: rgba(246,139,31,0.5);
    box-shadow: 0 4px 14px rgba(246,139,31,0.2);
}

/* Ana panel */
.cmp-main {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    background: rgba(10,18,32,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    backdrop-filter: blur(12px);
    overflow: hidden;
}
.cmp-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    padding: 18px 22px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
}
.cmp-title-main { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.15; }
.cmp-title-sub { margin-top: 4px; font-size: 13px; color: rgba(255,255,255,0.55); }
.cmp-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.cmp-sel-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 13px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    color: #fff; font-size: 13.5px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: border-color .15s, background .15s;
}
.cmp-sel-btn:hover { border-color: rgba(246,139,31,0.5); background: rgba(246,139,31,0.1); }
.cmp-metric-pop {
    position: absolute; top: calc(100% + 8px); right: 0; z-index: 50;
    width: 320px; max-height: 360px; overflow-y: auto;
    background: linear-gradient(180deg, #131c2e, #0d1422);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 6px;
    box-shadow: 0 22px 60px rgba(0,0,0,0.55);
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.25) transparent;
}
.cmp-metric-pop::-webkit-scrollbar { width: 8px; }
.cmp-metric-pop::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
.cmp-metric-h {
    padding: 9px 12px 4px; font-size: 11px; font-weight: 800; letter-spacing: 0.6px;
    text-transform: uppercase; color: rgba(255,255,255,0.4);
}
.cmp-metric-item {
    display: block; width: 100%; text-align: left;
    padding: 8px 12px; border: none; background: transparent;
    border-radius: 8px; color: rgba(255,255,255,0.85); font-size: 13.5px; cursor: pointer;
    transition: background .12s;
}
.cmp-metric-item:hover { background: rgba(255,255,255,0.06); }
.cmp-metric-item.on { background: rgba(246,139,31,0.16); color: #fff; font-weight: 700; }

.cmp-years { display: inline-flex; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; overflow: hidden; }
.cmp-years button {
    padding: 8px 12px; border: none; background: transparent; color: rgba(255,255,255,0.6);
    font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s, color .15s;
}
.cmp-years button.on { background: rgba(246,139,31,0.85); color: #fff; }

/* Üst şerit (il sayfası gt3-top'tan taşındı; sayfanın yüzey diline uyarlandı) */
.cmp-strip {
    /* SABİT şerit (S312): tek satır, sabit yükseklik — çip ekle/çıkar hiçbir şeyi kaydırmaz */
    flex: 0 0 auto; display: flex; align-items: center; gap: 12px; flex-wrap: nowrap;
    min-height: 58px; padding: 10px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.025);
}
.cmp-strip-chips {
    flex: 1 1 auto; min-width: 0; display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
    overflow-x: auto; padding: 2px 0;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
}
.cmp-strip-chips::-webkit-scrollbar { height: 6px; }
.cmp-strip-chips::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }
/* İl seçici (S312 sadeleştirme v2) — seçili iller şeritte çip, ekleme "+ İl" panelinden */
.cmp-chip { display: inline-flex; align-items: center; gap: 7px; padding: 5px 7px 5px 11px; border: 1px solid; border-radius: 999px; flex-shrink: 0; }
.cmp-chip-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.cmp-chip-name { font-size: 13.5px; font-weight: 600; color: #fff; white-space: nowrap; }
.cmp-chip-x { border: none; background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 5px; }
.cmp-chip-x:hover { color: #fff; background: rgba(255,255,255,0.12); }
.cmp-pick-wrap { position: relative; flex: 0 0 auto; }
.cmp-pick-trigger { display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 700; color: #FFB36A; background: rgba(246,139,31,0.08); border: 1px dashed rgba(246,139,31,0.55); border-radius: 999px; padding: 7px 14px; cursor: pointer; white-space: nowrap; transition: all 0.14s ease; }
.cmp-pick-trigger:hover, .cmp-pick-trigger.on { color: #fff; background: rgba(246,139,31,0.18); }
.cmp-pick-trigger em { font-style: normal; font-size: 11.5px; font-weight: 700; color: rgba(255,255,255,0.45); }
.cmp-pick-trigger svg { transition: transform 0.18s ease; }
.cmp-pick-trigger.on svg { transform: rotate(180deg); }
.cmp-pick-pop {
    position: absolute; top: calc(100% + 8px); left: 0; z-index: 50; width: 330px;
    background: linear-gradient(180deg, #131c2e, #0d1422);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; overflow: hidden;
    box-shadow: 0 22px 60px rgba(0,0,0,0.55);
}
.cmp-pick-short { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.cmp-pick-short button { font-size: 12px; font-weight: 700; padding: 6px 11px; border-radius: 999px; cursor: pointer; transition: all 0.14s ease; }
.cmp-pick-sim { color: #fff; background: rgba(19,148,185,0.18); border: 1px solid rgba(19,148,185,0.55); }
.cmp-pick-sim:hover:not(:disabled) { background: rgba(19,148,185,0.32); }
.cmp-pick-sim:disabled { opacity: 0.4; cursor: default; }
.cmp-pick-clear { color: rgba(255,255,255,0.6); background: none; border: 1px solid rgba(255,255,255,0.14); }
.cmp-pick-clear:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
.cmp-pick-cap { margin-left: auto; font-size: 11.5px; font-weight: 700; color: #FFB36A; white-space: nowrap; }
.cmp-pick-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cmp-pick-check { flex-shrink: 0; width: 16px; text-align: center; color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 800; }
.cmp-add-item:hover .cmp-pick-check { color: #fff; }
.cmp-add-item.dolu { opacity: 0.35; cursor: default; }
.cmp-add-item.dolu:hover { background: transparent; }
.cmp-add-head { display: flex; align-items: center; gap: 9px; padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
.cmp-add-search { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: #fff; font-size: 14px; }
.cmp-add-search::placeholder { color: rgba(255,255,255,0.4); }
.cmp-add-list { max-height: 300px; overflow-y: auto; padding: 6px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.25) transparent; }
.cmp-add-list::-webkit-scrollbar { width: 8px; }
.cmp-add-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
.cmp-add-item { display: flex; align-items: center; gap: 11px; width: 100%; padding: 8px 10px; border: none; background: transparent; border-radius: 9px; cursor: pointer; transition: background .13s; }
.cmp-add-item:hover { background: rgba(246,139,31,0.12); }
.cmp-add-chip { flex-shrink: 0; min-width: 34px; text-align: center; padding: 2px 6px; border-radius: 6px; font-size: 11.5px; font-weight: 800; border: 0.8px solid; }
.cmp-add-name { flex: 1; min-width: 0; color: rgba(255,255,255,0.9); font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmp-add-rank { flex-shrink: 0; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
.cmp-add-empty { padding: 16px; text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; }

/* Sahne */
.cmp-stage { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 8px 22px 18px; }
.cmp-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; color: rgba(255,255,255,0.45); }
.cmp-empty-t { font-size: 19px; font-weight: 700; color: rgba(255,255,255,0.85); }
.cmp-empty-s { max-width: 420px; font-size: 14px; }

.cmp-legend { display: flex; flex-wrap: wrap; gap: 16px; padding: 4px 2px 10px; }
.cmp-leg-item { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: rgba(255,255,255,0.7); }
.cmp-leg-dot { width: 10px; height: 10px; border-radius: 50%; }
.cmp-leg-item b { font-variant-numeric: tabular-nums; }

.cmp-radar-wrap { flex: 1; min-height: 0; display: flex; gap: 16px; align-items: stretch; }
.cmp-radar { flex: 1; min-height: 0; border-radius: 18px; background: radial-gradient(ellipse 58% 60% at 50% 47%, rgba(96,165,250,0.10), rgba(19,148,185,0.06) 42%, rgba(155,146,198,0.04) 64%, transparent 78%); }

/* Radar yan paneli — seçili illerin İLTEK sıralaması */
.cmp-lead { width: 286px; flex-shrink: 0; align-self: center; display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px 14px; max-height: 100%; overflow-y: auto; }
.cmp-lead-head { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted, #8aa0bf); margin-bottom: 4px; padding-left: 4px; }
.cmp-lead-row { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 10px; background: rgba(255,255,255,0.03); border-left: 3px solid transparent; }
.cmp-lead-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cmp-lead-name { flex: 1; min-width: 0; font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmp-lead-grade { flex-shrink: 0; min-width: 26px; text-align: center; padding: 2px 7px; border-radius: 6px; font-size: 11.5px; font-weight: 800; }
.cmp-lead-rank { flex-shrink: 0; font-size: 13px; font-weight: 700; color: var(--text-secondary, #b8c4d8); font-variant-numeric: tabular-nums; min-width: 30px; text-align: right; }
.cmp-lead-score { flex-shrink: 0; font-size: 13px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }

/* Bar */
.cmp-bar-scroll { flex: 1; min-height: 0; overflow-y: auto; padding-right: 6px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.25) transparent; }
.cmp-bar-scroll::-webkit-scrollbar { width: 8px; }
.cmp-bar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
.cmp-bar-row { display: flex; align-items: center; gap: 10px; height: 30px; padding: 0 6px; border-radius: 6px; cursor: pointer; }
.cmp-bar-row:hover { background: rgba(255,255,255,0.04); }
.cmp-bar-rank { width: 26px; text-align: right; font-size: 11.5px; font-weight: 700; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; flex-shrink: 0; }
.cmp-bar-name { width: 128px; font-size: 13px; color: rgba(255,255,255,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.cmp-bar-track { flex: 1; height: 13px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; display: flex; align-items: center; gap: 7px; }
.cmp-bar-fill { display: block; align-self: stretch; border-radius: 4px; transition: width .3s ease; }
.cmp-bar-val { font-size: 12.5px; font-weight: 700; color: rgba(255,255,255,0.8); font-variant-numeric: tabular-nums; flex-shrink: 0; }
/* Karşılaştırma (2+ il) bar'ı kutuyu dikeyde doldursun — il sayfası SubIndexExplorer ile birebir */
.cmp-bar-scroll--fill { display: flex; flex-direction: column; gap: 8px; }
.cmp-bar-scroll--fill .cmp-bar-row { flex: 1 1 0; min-height: 28px; height: auto; align-items: stretch; }
.cmp-bar-scroll--fill .cmp-bar-rank, .cmp-bar-scroll--fill .cmp-bar-name, .cmp-bar-scroll--fill .cmp-bar-val { align-self: center; }
.cmp-bar-scroll--fill .cmp-bar-track { height: auto; }

/* Fark / Dumbbell görünümü — alt endekslerde iller arası açık */
.cmp-dumb { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 6px; padding: 18px 14px 18px 6px; overflow-y: auto; }
.cmp-dumb-row { flex: 1 1 0; min-height: 54px; display: flex; align-items: center; gap: 18px; }
.cmp-dumb-name { width: 168px; flex-shrink: 0; text-align: right; font-size: 13.5px; font-weight: 600; color: rgba(255,255,255,0.82); }
.cmp-dumb-track { position: relative; flex: 1; height: 100%; min-width: 0; }
.cmp-dumb-track::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: rgba(255,255,255,0.07); transform: translateY(-50%); border-radius: 2px; }
.cmp-dumb-line { position: absolute; top: 50%; height: 5px; transform: translateY(-50%); background: rgba(255,255,255,0.22); border-radius: 3px; }
.cmp-dumb-dot { position: absolute; top: 50%; width: 17px; height: 17px; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #0d1422; box-shadow: 0 2px 7px rgba(0,0,0,0.5); z-index: 2; }
.cmp-dumb-val { position: absolute; transform: translateX(-50%); font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; z-index: 3; }
.cmp-dumb-gap { width: 62px; flex-shrink: 0; text-align: right; font-size: 14px; font-weight: 800; color: var(--accent-gold, #F68B1F); font-variant-numeric: tabular-nums; }

/* Line */
.cmp-line { flex: 1; min-height: 0; position: relative; }
.cmp-line-svg { display: block; position: absolute; inset: 0; }

/* Map */
/* Harita alanı SABİT — lejant overlay olduğu için harita boyu hiç değişmez */
.cmp-map { flex: 1; min-height: 0; position: relative; display: flex; align-items: center; justify-content: center; }
.cmp-map-canvas { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.cmp-map-svg {
    width: 100%; height: 100%; max-height: 100%; overflow: visible;
    /* Dashboard'daki harita gölgesi */
    filter: drop-shadow(0 18px 28px rgba(0,0,0,0.55)) drop-shadow(0 6px 14px rgba(0,0,0,0.35));
}
/* Dashboard tooltip stili */
.cmp-map-tip {
    position: absolute; top: 12px; left: 12px;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 10px 16px;
    pointer-events: none; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.cmp-map-tip-name { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: #fff; }
.cmp-map-tip-rank { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 800; color: #fff; background: rgba(246,139,31,0.25); border: 1px solid rgba(246,139,31,0.5); }
.cmp-map-tip-grade { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.cmp-map-tip-v { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.cmp-map-tip-v b { color: #e2e8f0; }
/* İl sayfası deseni: seçili illerin üzerindeki #sıra etiketi (beyaz + koyu halo) */
.cmp-map-rank { font-size: 13px; font-weight: 800; fill: #fff; stroke: rgba(3,7,18,0.85); stroke-width: 3px; paint-order: stroke; pointer-events: none; }
/* Sıralama (rank) skala lejantı */
.cmp-map-legend { position: absolute; bottom: 8px; right: 12px; display: flex; align-items: center; gap: 8px; }
.cmp-map-legend-end { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); }
.cmp-map-legend-bar { width: 120px; height: 8px; border-radius: 4px; }
/* Genel harita — 8 harf-notu kart lejantı: overlay (harita boyunu değiştirmez), SOL kenarda dikey, KÜÇÜK */
.cmp-map-glegend { position: absolute; left: 6px; top: 50%; transform: translateY(-50%); z-index: 3; display: grid; grid-template-columns: auto; gap: 4px; }
.cmp-map-gcard { display: flex; align-items: center; gap: 5px; background: rgba(13,20,34,0.72); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; padding: 3px 8px 3px 3px; cursor: pointer; transition: opacity .15s, border-color .15s, background .15s; }
.cmp-map-gcard:hover, .cmp-map-gcard.on { background: rgba(13,20,34,0.9); }
.cmp-map-gbadge { width: 19px; height: 19px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9.5px; font-weight: 800; color: #fff; flex-shrink: 0; }
.cmp-map-glabel { font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap; }

/* Table — overflow-x: mobilde 5+ il sütunu ekrana sığmaz, tablo kendi içinde yatay kayar (S312) */
.cmp-table-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; }
/* Kaydırma ipucu yalnız telefonda görünür (masaüstünde tablo zaten sığıyor) */
.cmp-table-hint { display: none; }
.cmp-table-scroll { flex: 1; min-height: 0; overflow-y: auto; overflow-x: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.25) transparent; }
.cmp-table-scroll::-webkit-scrollbar { width: 8px; }
.cmp-table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
.cmp-table { width: 100%; border-collapse: collapse; }
.cmp-table thead th { position: sticky; top: 0; background: #0e1626; padding: 11px 12px; text-align: left; font-size: 12.5px; font-weight: 700; color: rgba(255,255,255,0.7); border-bottom: 1px solid rgba(255,255,255,0.12); }
.cmp-table thead th:first-child { width: 42%; }
.cmp-table tbody td { padding: 8px 12px; font-size: 13px; color: var(--text-primary); border-bottom: 1px solid rgba(255,255,255,0.05); font-variant-numeric: tabular-nums; }
.cmp-td-label { color: rgba(255,255,255,0.78); }
.cmp-td-rank { margin-left: 7px; font-size: 10.5px; font-weight: 600; color: rgba(255,255,255,0.38); }
.cmp-td-label.indent { padding-left: 26px; color: rgba(255,255,255,0.55); font-size: 12.5px; }
.cmp-td-label.group { font-weight: 700; color: #fff; }
.cmp-td-label.strong { font-weight: 700; color: #fff; }
.cmp-tr-group td { background: rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.08); }

@media (max-width: 880px) {
    .cmp-root { flex-direction: column; height: auto; padding: 8px 10px 12px; gap: 8px; }
    /* GÖRÜNÜM RAYI: 6 buton dikey kart olarak 87px yer yiyordu. Telefonda tek satır,
       ikon+etiket yan yana, kompakt — grafiğe ulaşmak için kaydırma gerekmesin. */
    .cmp-rail {
        width: 100%; flex-direction: row; flex-wrap: nowrap; gap: 4px;
        padding: 5px 6px; border-radius: 14px; overflow-x: auto;
        scrollbar-width: none;
    }
    .cmp-rail::-webkit-scrollbar { display: none; }
    .cmp-rail-btn {
        flex: 1 1 0; min-width: 0; flex-direction: column; gap: 2px;
        padding: 7px 2px; border-radius: 10px; font-size: 10.5px;
    }
    .cmp-rail-btn svg { width: 17px; height: 17px; }
    .cmp-head { flex-direction: column; }
    /* Başlık altındaki il listesi çiplerle birebir aynı bilgi — telefonda tekrar */
    .cmp-title-sub { display: none; }
    /* Çipler: 5 il 3 satıra taşıyordu; küçültünce 2 satıra iniyor */
    .cmp-chip { padding: 4px 5px 4px 9px; gap: 5px; }
    .cmp-chip-name { font-size: 12px; }
    .cmp-chip-dot { width: 7px; height: 7px; }
    /* Kazanılan yer grafiğe verilir */
    .cmp-lead { padding: 12px 10px; }
    .cmp-lead-row { padding: 7px 9px; }
    /* S310 mobil: grafik + sıralama paneli YAN YANA SIĞMAZ — dikey yığıl (iç içe binme fixi) */
    .cmp-stage { padding: 8px 4px 14px; }
    .cmp-radar-wrap { flex-direction: column; align-items: stretch; }
    .cmp-radar { flex: none; height: min(88vw, 400px); }
    .cmp-lead { width: 100%; align-self: stretch; max-height: none; }
    /* flex:1 yükseklikleri masaüstü tam-sayfa düzeninden gelir; mobilde height:auto olunca
       ÇÖKÜP 0 olur (çizgi grafik boş görünüyordu) — her görünüme açık yükseklik ver */
    .cmp-line { flex: none; height: min(80vw, 400px); }
    /* Fark görünümü: 168px'lik satır adı sütunu dar ekranda rayı sağa sıkıştırıyordu
       (noktalar üst üste biniyor, #sıra etiketleri çakışıyordu). Kısa ad + dar sütun. */
    .cmp-dumb { padding: 14px 10px 14px 4px; }
    .cmp-dumb-row { gap: 10px; min-height: 48px; }
    .cmp-dumb-name { width: 74px; font-size: 12.5px; }
    .cmp-dumb-val { font-size: 11px; }
    /* Harita ~2,4:1 enine bir şekil. Genişlik kısıtlayıcı olduğu için harita ancak
       kenar boşlukları kırpılınca büyür: kutu tam genişliğe taşar (negatif marj). */
    .cmp-map {
        flex: none; height: min(56vw, 300px); flex-direction: column; align-items: stretch;
        margin-left: -14px; margin-right: -14px;
    }
    /* TABLO (telefon): kapsayıcı iki eksende de kaydırılır kalır — yatay parmak çekişi
       bu haliyle çalışıyor (ölçüldü) ve sütun başlığı üstte sabit kalır. Asıl eksik olan
       şeyler aşağıda: sabit gösterge sütunu + kaydırma işareti. */
    .cmp-table-wrap { position: relative; }
    .cmp-table-scroll { flex: none; max-height: 70vh; }
    /* Gösterge sütunu sabit: yana kayarken hangi satırda olduğun kaybolmasın */
    .cmp-table thead th:first-child,
    .cmp-table tbody td:first-child {
        position: sticky; left: 0; z-index: 2;
        background: #0e1626;
        box-shadow: 1px 0 0 rgba(255,255,255,0.10);
    }
    .cmp-table thead th:first-child { z-index: 3; width: 38%; }
    .cmp-table tbody td { padding: 7px 10px; font-size: 12.5px; }
    /* Sağ kenarda "devamı var" solması */
    .cmp-table-wrap::after {
        content: ''; position: absolute; top: 26px; bottom: 0; right: 0; width: 26px;
        pointer-events: none; z-index: 4;
        background: linear-gradient(to right, rgba(9,15,26,0), rgba(9,15,26,0.85));
    }
    .cmp-table-hint {
        display: block; padding: 0 4px 7px; text-align: center;
        font-size: 11.5px; font-weight: 600; color: rgba(255,255,255,0.45);
    }
    /* radar kenar etiketleri (Yaşam Kalitesi / Ar-Ge) 390px'te kırpılmasın.
       Ayrıca dar ekranda alt endeks adları KISA biçimde verilir (SUBS.short). */
    .cmp-radar svg text { font-size: 11px !important; }
    /* recharts kendi lejantı: eksen yazıları 11px'e inince 14px lejant orantısız kalıyordu
       + alttaki eksen etiketlerine bitişikti */
    .cmp-radar .recharts-legend-wrapper { padding-top: 4px !important; }
    .cmp-radar .recharts-legend-item { margin-right: 10px !important; }
    .cmp-radar .recharts-legend-item-text { font-size: 12px !important; }
    .cmp-radar .recharts-legend-item svg { width: 10px !important; height: 10px !important; }
    /* Seçili il çipleri: yatay kaydırmada sağdakiler görünmüyordu (kaydırma ipucu da yok).
       Telefonda şerit sarsın — seçili illerin hepsi görünür olsun. */
    .cmp-strip { flex-wrap: wrap; min-height: 0; padding: 10px 14px; gap: 8px; }
    .cmp-strip-chips { flex-wrap: wrap; overflow-x: visible; row-gap: 6px; }
    .cmp-title-main { font-size: 18px; }
    .cmp-title-sub { font-size: 12px; }
    /* Gösterge seçici + yıl çipleri yan yana sığmıyor: "2026 Ara Dönem" üç satıra bölünüyordu.
       Telefonda alt alta, her biri tam genişlik — yıl etiketleri tek satırda kalır. */
    .cmp-head { padding: 14px 14px 10px; gap: 10px; }
    .cmp-controls { flex-direction: column; align-items: stretch; width: 100%; gap: 8px; }
    .cmp-controls > .cmp-metric { width: 100%; }
    .cmp-sel-btn { width: 100%; justify-content: space-between; }
    .cmp-years { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; width: 100%; }
    .cmp-years button { white-space: nowrap; padding-left: 6px; padding-right: 6px; font-size: 12.5px; }
    /* not lejantı haritanın üstüne binmesin — tuval de akışa alınır, lejant üstte yatay sarar */
    .cmp-map-canvas { position: static; flex: 1; min-height: 0; width: 100%; }
    .cmp-map-glegend {
        position: static; transform: none; order: -1;
        grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; margin-bottom: 6px; width: auto;
        /* .cmp-map tam genişliğe taşıyor (negatif marj); lejant kırpılmasın diye geri içeri alınır */
        padding-left: 14px; padding-right: 14px;
    }
}
